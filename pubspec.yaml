name: flower_shop
description: "Flower Shop - Premium Flower Shop"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  flutter_web_plugins:
    sdk: flutter
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.4
  firebase_storage: ^12.4.5
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  firebase_messaging: ^15.2.10
  http: ^1.6.0
  googleapis_auth: ^2.3.1
  dart_jsonwebtoken: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
